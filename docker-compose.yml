# Жергілікті әзірлеу ортасы: PostgreSQL + Redis
# Іске қосу: docker compose up -d
# (Backend әзірге жергілікті жүргізіледі: cd backend && uv run uvicorn app.main:app --reload)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adal
      POSTGRES_PASSWORD: adal-dev-password # тек локал dev; продта - құпия менеджерден
      POSTGRES_DB: adal_jumys
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adal -d adal_jumys"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
