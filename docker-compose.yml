# Жергілікті әзірлеу ортасы
# Тек БД + Redis (backend жергілікті uv-мен): docker compose up -d
# Бәрі бірге (backend қоса):                  docker compose --profile app up -d
services:
  backend:
    profiles: ["app"]
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://adal:adal-dev-password@postgres:5432/adal_jumys
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_BACKEND: redis
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY орта айнымалысы керек}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adal
      POSTGRES_PASSWORD: adal-dev-password # тек локал dev; продта - құпия менеджерден
      POSTGRES_DB: adal_jumys
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adal -d adal_jumys"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
